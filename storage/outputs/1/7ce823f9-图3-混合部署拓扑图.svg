<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" width="900" height="520">
  <!-- 背景 -->
  <rect width="900" height="520" fill="#fafafa"/>
  
  <!-- 标题 -->
  <text x="450" y="30" text-anchor="middle" font-family="Microsoft YaHei, sans-serif" font-size="18" font-weight="bold" fill="#1a1a1a">私有通道集群部署拓扑（混合架构）</text>
  
  <!-- 云端大脑区（左侧） -->
  <rect x="30" y="50" width="320" height="420" rx="12" fill="#e8eaf6" stroke="#3f51b5" stroke-width="2"/>
  <text x="190" y="75" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#3f51b5">云端大脑区</text>
  <text x="190" y="95" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" fill="#5c6bc0">调度中心 · 大模型推理 · 训练场</text>
  
  <!-- 云端组件 -->
  <rect x="50" y="115" width="280" height="70" rx="6" fill="#5c6bc0" stroke="#3f51b5" stroke-width="1.5"/>
  <text x="190" y="140" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="bold" fill="#ffffff">Agent调度中心</text>
  <text x="190" y="160" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#e8eaf6">任务编排 · 资源调度 · 状态监控</text>
  <text x="190" y="175" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#c5cae9">云端部署 · 高可用集群</text>
  
  <rect x="50" y="205" width="280" height="70" rx="6" fill="#7986cb" stroke="#3f51b5" stroke-width="1.5"/>
  <text x="190" y="230" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="bold" fill="#ffffff">模型中心</text>
  <text x="190" y="250" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#e8eaf6">基座模型 · 微调训练 · 推理服务</text>
  <text x="190" y="265" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#c5cae9">多模型统一纳管 · GPU算力池</text>
  
  <rect x="50" y="295" width="280" height="70" rx="6" fill="#9fa8da" stroke="#3f51b5" stroke-width="1.5"/>
  <text x="190" y="320" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="bold" fill="#ffffff">Skills市场</text>
  <text x="190" y="340" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#e8eaf6">能力发现 · 可信验证 · 版本管理</text>
  <text x="190" y="355" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#c5cae9">私域生态 · 安全审计</text>
  
  <rect x="50" y="385" width="280" height="70" rx="6" fill="#c5cae9" stroke="#3f51b5" stroke-width="1.5"/>
  <text x="190" y="410" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="bold" fill="#3f51b5">云端安全网关</text>
  <text x="190" y="430" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#5c6bc0">国密SM2/SM3/SM4加密</text>
  <text x="190" y="445" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#7986cb">TLS1.3 · 双向证书认证</text>
  
  <!-- 中间：安全隧道 -->
  <rect x="380" y="50" width="140" height="420" rx="8" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="450" y="80" text-anchor="middle" font-family="Microsoft YaHei" font-size="13" font-weight="bold" fill="#ef6c00">安全隧道</text>
  <text x="450" y="100" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#f57c00">跨网段代理</text>
  
  <!-- 隧道组件 -->
  <rect x="395" y="130" width="110" height="60" rx="4" fill="#ffe0b2" stroke="#f57c00" stroke-width="1"/>
  <text x="450" y="155" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" font-weight="bold" fill="#e65100">正向代理</text>
  <text x="450" y="172" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#ef6c00">指令下发通道</text>
  <text x="450" y="185" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#ef6c00">WebSocket长连接</text>
  
  <rect x="395" y="210" width="110" height="60" rx="4" fill="#ffe0b2" stroke="#f57c00" stroke-width="1"/>
  <text x="450" y="235" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" font-weight="bold" fill="#e65100">反向代理</text>
  <text x="450" y="252" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#ef6c00">结果回传通道</text>
  <text x="450" y="265" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#ef6c00">加密数据流</text>
  
  <rect x="395" y="290" width="110" height="60" rx="4" fill="#ffe0b2" stroke="#f57c00" stroke-width="1"/>
  <text x="450" y="315" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" font-weight="bold" fill="#e65100">国密模块</text>
  <text x="450" y="332" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#ef6c00">SM2数字签名</text>
  <text x="450" y="345" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#ef6c00">SM4数据加密</text>
  
  <rect x="395" y="370" width="110" height="60" rx="4" fill="#ffe0b2" stroke="#f57c00" stroke-width="1"/>
  <text x="450" y="395" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" font-weight="bold" fill="#e65100">访问审计</text>
  <text x="450" y="412" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#ef6c00">全链路日志</text>
  <text x="450" y="425" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#ef6c00">行为追溯分析</text>
  
  <!-- 箭头：云端到隧道 -->
  <line x1="330" y1="185" x2="390" y2="160" stroke="#3f51b5" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="330" y1="240" x2="390" y2="200" stroke="#3f51b5" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="330" y1="330" x2="390" y2="240" stroke="#3f51b5" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="330" y1="420" x2="390" y2="320" stroke="#3f51b5" stroke-width="2" stroke-dasharray="5,3"/>
  
  <polygon points="385,155 375,162 385,169" fill="#3f51b5"/>
  
  <!-- 内网手脚区（右侧） -->
  <rect x="550" y="50" width="320" height="420" rx="12" fill="#e8f5e9" stroke="#388e3c" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="710" y="75" text-anchor="middle" font-family="Microsoft YaHei" font-size="14" font-weight="bold" fill="#2e7d32">内网手脚区</text>
  <text x="710" y="95" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" fill="#43a047">Agent执行节点 · 业务系统接入</text>
  
  <!-- 内网组件 -->
  <rect x="570" y="115" width="280" height="70" rx="6" fill="#66bb6a" stroke="#388e3c" stroke-width="1.5"/>
  <text x="710" y="140" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="bold" fill="#ffffff">Agent执行节点</text>
  <text x="710" y="160" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#e8f5e9">任务执行 · 本地计算 · 数据交互</text>
  <text x="710" y="175" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#c8e6c9">轻量级容器 · 内网隔离运行</text>
  
  <rect x="570" y="205" width="280" height="70" rx="6" fill="#81c784" stroke="#388e3c" stroke-width="1.5"/>
  <text x="710" y="230" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="bold" fill="#ffffff">内网业务系统</text>
  <text x="710" y="250" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#e8f5e9">OA系统 · 审批系统 · 档案系统</text>
  <text x="710" y="265" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#c8e6c9">零改造集成 · 浏览器插件接入</text>
  
  <rect x="570" y="295" width="280" height="70" rx="6" fill="#a5d6a7" stroke="#388e3c" stroke-width="1.5"/>
  <text x="710" y="320" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="bold" fill="#1b5e20">本地安全代理</text>
  <text x="710" y="340" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#2e7d32">指令解析 · 结果封装 · 安全过滤</text>
  <text x="710" y="355" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#43a047">白名单校验 · 行为边界控制</text>
  
  <rect x="570" y="385" width="280" height="70" rx="6" fill="#c8e6c9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="710" y="410" text-anchor="middle" font-family="Microsoft YaHei" font-size="12" font-weight="bold" fill="#1b5e20">内网安全网关</text>
  <text x="710" y="430" text-anchor="middle" font-family="Microsoft YaHei" font-size="9" fill="#2e7d32">单向数据流 · 物理隔离可选</text>
  <text x="710" y="445" text-anchor="middle" font-family="Microsoft YaHei" font-size="8" fill="#43a047">等保2.0三级 · 涉密环境适配</text>
  
  <!-- 箭头：隧道到内网 -->
  <line x1="510" y1="160" x2="565" y2="150" stroke="#388e3c" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="510" y1="240" x2="565" y2="240" stroke="#388e3c" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="510" y1="320" x2="565" y2="330" stroke="#388e3c" stroke-width="2" stroke-dasharray="5,3"/>
  <line x1="510" y1="400" x2="565" y2="420" stroke="#388e3c" stroke-width="2" stroke-dasharray="5,3"/>
  
  <polygon points="560,145 570,150 560,155" fill="#388e3c"/>
  
  <!-- 双向箭头标注 -->
  <text x="450" y="490" text-anchor="middle" font-family="Microsoft YaHei" font-size="11" font-weight="bold" fill="#666">大脑+手脚分离架构 · 跨网段安全通信 · 国密算法加密</text>
  
  <!-- 安全等级标注 -->
  <rect x="30" y="485" width="140" height="25" rx="4" fill="#3f51b5" opacity="0.8"/>
  <text x="100" y="502" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" fill="#ffffff">互联网可达区</text>
  
  <rect x="550" y="485" width="140" height="25" rx="4" fill="#388e3c" opacity="0.8"/>
  <text x="620" y="502" text-anchor="middle" font-family="Microsoft YaHei" font-size="10" fill="#ffffff">内网隔离区</text>
</svg>